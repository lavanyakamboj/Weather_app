<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyCast</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>SkyCast</h1>

    <div class="search-box">

        <input
            type="text"
            id="locationInput"
            placeholder="Search city..."
        >

        <button onclick="getWeather()">
            🔍
        </button>

    </div>

    <div class="weather-card" id="weatherCard">

        <img id="weatherIcon" src="" alt="">

        <h2 id="cityName">Delhi</h2>

        <div class="temperature">
            <span id="temp">32</span>°
        </div>

        <p class="condition" id="condition">
            Sunny
        </p>

        <div class="details">

            <div class="detail">
                <span>💧</span>
                <p>Humidity</p>
                <h3 id="humidity">65%</h3>
            </div>

            <div class="detail">
                <span>🌬</span>
                <p>Wind</p>
                <h3 id="wind">10</h3>
            </div>

            <div class="detail">
                <span>🌡</span>
                <p>Feels Like</p>
                <h3 id="feelsLike">35°</h3>
            </div>

            <div class="detail">
                <span>☀</span>
                <p>UV</p>
                <h3 id="uv">5</h3>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
